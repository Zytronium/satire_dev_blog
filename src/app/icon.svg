<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#ffffff22" stroke-width="2.5"/>
  <g>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 16 16" to="360 16 16" dur="1.2s" repeatCount="indefinite"/>
    <circle cx="16" cy="16" r="10" fill="none" stroke="#7c6ff7" stroke-width="2.5"
            stroke-linecap="round" stroke-dashoffset="4">
      <animate attributeName="stroke-dasharray" values="50 13; 8 55; 50 13"
               dur="1.8s" repeatCount="indefinite" calcMode="spline"
               keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </circle>
  </g>
</svg>